server {
    listen       80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
    }

    location ~ \.js$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, must-revalidate";
    }

    location ~ \.mjs$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, must-revalidate";
    }

    location ~ \.task$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, must-revalidate";
        add_header Content-Type "application/octet-stream";
    }
}
